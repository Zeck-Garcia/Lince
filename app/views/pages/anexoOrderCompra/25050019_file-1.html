<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    html, body, div, span, applet, object, iframe,
h1, h2, h3, h4, h5, h6, p, blockquote, pre,
a, abbr, acronym, address, big, cite, code,
del, dfn, em, img, ins, kbd, q, s, samp, strike, sub, sup, tt, var,
b, u, i, center,
dl, dt, dd, ol, ul, li,
fieldset, form, label, legend,
table, caption, tbody, tfoot, thead, tr, th, td,
article, aside, canvas, details, embed, 
figure, figcaption, footer, header, hgroup, 
menu, nav, output, ruby, section, summary,
time, mark, audio, video {
	margin: 0;
	padding: 0;
	border: 0;
	font-size: 100%;
	/* font: inherit; */
	vertical-align: baseline;
}
/* HTML5 display-role reset for older browsers */
article, aside, details, figcaption, figure, 
footer, header, hgroup, menu, nav, section {
	display: block;
}
body {
	line-height: 1.1;
}
ol, ul {
	list-style: none;
}
blockquote, q {
	quotes: none;
}
blockquote:before, blockquote:after,
q:before, q:after {
	content: '';
	content: none;
}
table {
	border-collapse: collapse;
	border-spacing: 0;
}

a{
	text-decoration: none;
	color: inherit;
}

*{
	box-sizing: border-box;
}

#headerMenu{
    height: 100vh;
    width: 250px;
    background-color: yellow;
    position: relative;

}

#btnCloseMenu{
    position: absolute;
    right: -35px;
    top: 25px;
    width: 35px;
    height: 35px;
    background-color: red;
    border: none;
    border-radius:  0 6px 6px 0;
    font-size: 16pt;

}


#divLogo{
    width: 100%;
    height: 90px;
    background-color: rgb(0,119,182);
    align-content: center;
    text-align: center;
}

#divLogo > span{
    font-weight: 600;
    font-size: 25pt;
    color: #fff;
}


#divNav{
    height: calc(100vh - 160px);
    width: 100%;
    background-color: pink;
}

#divUser{
    width: 100%;
    height: 70px;
    background-color: rgb(144,224,239);
}




.list{
    position: relative;
    padding: 50px;
}

.input{
    position: absolute;
    height: 50px;
    transition: 0.2s ease;

}

.label{
    position: absolute;
    transition: 0.2s ease;
    height: 50px;
    font-size: 18pt;
    align-content: center;
}

.input:focus + .label{
    color: red;
    transform: translate(-0px, -28px) scale(0.8);
    line-height: 50px;
    height: 50px;
    z-index: 9;
    background-color: yellow;
}

.select:focus+ .label{
    color: red;
    transform: translate(-0px, -28px) scale(0.8);
    line-height: 50px;
    height: 50px;
    z-index: 9;
    background-color: yellow;
}

.select{
    position: absolute;
    height: 50px;
    width: 150px;
}


</style>
